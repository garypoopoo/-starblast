name: Deploy STARBLAST to GitHub Pages

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Install raylib headers for Emscripten
        run: |
          git clone --depth 1 --branch 5.0 https://github.com/raysan5/raylib.git /tmp/raylib
          cd /tmp/raylib/src
          emmake make PLATFORM=PLATFORM_WEB -j$(nproc)
          sudo cp /tmp/raylib/src/libraylib.a $(em-config CACHE)/sysroot/lib/wasm32-emscripten/
          sudo cp /tmp/raylib/src/raylib.h    $(em-config CACHE)/sysroot/include/

      - name: Build WebAssembly
        run: |
          mkdir -p web
          emcc src/*.c \
            -Iinclude \
            -I$(em-config CACHE)/sysroot/include \
            $(em-config CACHE)/sysroot/lib/wasm32-emscripten/libraylib.a \
            -o web/index.html \
            --shell-file shell.html \
            -Os \
            -s USE_GLFW=3 \
            -s ASYNCIFY \
            -s TOTAL_MEMORY=67108864 \
            -DPLATFORM_WEB

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
